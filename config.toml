# remote_codex_agent - Codex CLI QQ 调度器配置

[plugin]
# 配置文件版本
config_version = "0.3.0"

# 是否启用插件。触发权限由 permission 控制。
enabled = true

[server]
# 远程 Ubuntu Agent 服务地址，例如 "https://agent.example.com" 或 "http://10.0.0.2:8080"
base_url = ""

# 鉴权 token。插件会以 Authorization: Bearer <token> 形式发送。
api_token = ""

# 是否要求配置 api_token。生产环境建议保持 true。
require_api_token = true

# 创建任务接口路径
create_path = "/v1/tasks"

# 查询任务状态接口路径模板，必须包含 {task_id}
status_path_template = "/v1/tasks/{task_id}"

# 取消任务接口路径模板，必须包含 {task_id}
cancel_path_template = "/v1/tasks/{task_id}/cancel"

# HTTP 请求超时秒数
request_timeout_seconds = 20.0

# 是否校验 HTTPS 证书。内网自签证书可临时关闭。
verify_tls = true

[permission]
# 是否允许所有用户触发。
# true 表示默认所有用户都能触发；如 user_list_mode = "blacklist"，trigger_users 里的用户仍会被禁止。
# false 表示必须通过用户白名单；可使用旧 allowed_users，或使用 user_list_mode = "whitelist" + trigger_users。
allow_all_users = false

# 旧版用户白名单，保留兼容。推荐新配置使用 user_list_mode + trigger_users。
allowed_users = []

# 用户名单模式：whitelist 或 blacklist。
# whitelist：只有 trigger_users 里的用户能触发。
# blacklist：trigger_users 里的用户不能触发，其他用户按 allow_all_users 规则处理。
user_list_mode = "blacklist"

# 用户黑白名单。推荐写成 "qq:用户ID"；也兼容只写用户 ID。
trigger_users = []

# 管理员用户。允许使用 danger-full-access 等高危配置。
admin_users = []

# 旧版聊天流白名单，保留兼容。推荐新配置使用 chat_list_mode + trigger_chats。
allowed_groups = []

# 聊天流名单模式：whitelist 或 blacklist。
# 聊天流就是触发 /codex 的地方，可以是 QQ 群、QQ 私聊或 MaiBot 识别到的其他对话来源。
# 如果你只在群里使用，把这里当成“群组黑白名单”理解即可。
chat_list_mode = "blacklist"

# 聊天流黑白名单。可写群号、"qq:群号" 或 stream_id；空列表表示不限制聊天流。
trigger_chats = []

# 是否拒绝 QQ 群临时私聊触发。
# 群临时会话在部分 adapter 路由下可能把回复发回群聊，建议保持 true。
reject_temporary_private_chat = true

[task]
# 帮助文本默认展示的主命令前缀。命令组件当前固定支持 /codex 和 /agent。
command_prefix = "/codex"

# 执行模式：local 表示直接调用本机 Codex CLI；remote 表示调用 server.base_url。
execution_mode = "local"

# 是否允许取消远程任务
enable_cancel = true

# 提交给远程服务的任务类型
task_type = "codex_cli"

# 单个聊天流同时运行的最大任务数
max_running_tasks_per_stream = 1

# 单个用户同时运行的最大任务数
max_running_tasks_per_user = 1

# 轮询远程任务状态间隔，单位秒
poll_interval_seconds = 5.0

# 单个任务最长跟踪时间，单位秒。远程任务可能继续运行，但插件会停止转发。
max_watch_seconds = 3600.0

# 普通 task 可通过 resume 继续的保留时间，单位小时。只清理插件记录，不删除产物目录。
resumable_task_ttl_hours = 24.0

# 把普通 task 转为 session 时是否要求二次确认。
require_session_confirm = true

# 启动时是否自动清理超过 resumable_task_ttl_hours 的普通 task 记录。
auto_cleanup_task_records = true

# 自动清理过期 task 记录时，是否同时删除对应 task workspace 和产物文件。
# 建议确认产物不需要长期保留后再开启。
auto_cleanup_task_workspaces = true

# 是否启用后台定时清理。默认关闭；长时间不重启 MaiBot 时可开启。
enable_periodic_cleanup = false

# 后台定时清理间隔，单位分钟。
# 每次会按上面的自动清理开关处理过期 task 记录/workspace，并按 input_file 的 TTL 清理输入材料。
periodic_cleanup_interval_minutes = 60.0

[local_codex]
# Codex CLI 可执行文件名或绝对路径。
codex_binary = "codex"

# 本地任务根目录。相对路径按插件目录解析。
# 默认写入 remote_codex_agent/data/tasks。
# 不建议使用默认目录以外的其他路径，可能存在安全和误删风险，除非你知道自己在做什么。
work_root = "data/tasks"

# Codex CLI 的沙箱模式。推荐 workspace-write。
sandbox = "workspace-write"

# Codex CLI 的审批策略。服务器无人值守时推荐 never。
approval_policy = "never"

# 可选模型名，留空则使用 Codex CLI 默认配置。
model = ""

# 是否传递 --search。取决于服务器上的 Codex CLI 版本是否支持。
enable_search = false

# 额外传给 codex exec 的参数，例如 ["--profile", "server-agent"]。
extra_args = []

# 本地 Codex 任务运行超时，单位秒。
process_timeout_seconds = 3600.0

# 产物匹配规则，会在任务 workspace 下扫描。
artifact_globs = [
    "artifacts/*",
    "*.docx",
    "*.pdf",
    "*.md",
    "*.zip",
    "*.xlsx",
    "*.pptx",
]
env_file = "plugins/remote_codex_agent/.env.local"

[progress]
# 是否把运行进度转发到 QQ
forward_progress = true

# 进度消息最小发送间隔，单位秒
min_send_interval_seconds = 5.0

# 每次最多合并多少条进度
max_progress_items_per_message = 5

# 单条进度最大字符数
max_progress_item_chars = 300

# 最终摘要最大字符数
max_summary_chars = 1800

# 是否允许用户在创建任务时添加参数，把阶段性进度私聊发送给触发用户。
# 需要 napcat.enabled = true，且机器人能私聊该用户；失败时可回退当前聊天流。
# QQ/NapCat 发送私聊通常要求触发用户先主动私聊机器人一次。
# 群临时会话不等同于好友私聊，可能发送失败。
enable_private_progress = true

# 触发私聊进度的参数。示例：/codex --dm 生成一份报告
private_progress_trigger_args = ["--dm", "--private-progress"]

# 私聊进度发送失败时，是否回退到原聊天流发送进度。
private_progress_fallback_to_origin = true

[artifact]
# 是否在完成时发送产物列表或下载链接
send_artifact_links = true

# 如果远程服务返回 artifact.custom_payload，是否尝试用 send.custom 发送文件消息。
# 只有当前 QQ 适配器支持对应自定义消息时才会成功。
try_custom_file_message = false

# 自定义文件消息类型。不同适配器可能不同，例如 "file"。
custom_file_message_type = "file"

[napcat]
# 是否启用 NapCat HTTP API 直接上传产物文件。
# 需要在 NapCat WebUI 中为本 bot 新建 HTTP 服务器。
enabled = false

# NapCat HTTP Server 协议：http 或 https。
scheme = "http"

# NapCat HTTP Server 地址。和 MaiBot 同机部署通常填 127.0.0.1。
host = "127.0.0.1"

# NapCat HTTP Server 端口，例如在 NapCat WebUI 里新增 9998。
port = 9998

# NapCat HTTP Server token。若 NapCat 该端口未设置 token，留空。
token = ""

# 上传请求超时秒数。大文件可适当调高。
request_timeout_seconds = 120.0

# 调用 upload_group_file/upload_private_file 时是否执行真实上传。
upload_file = true

# 单个产物最大上传大小，单位 MB。0 表示不限制。
max_file_size_mb = 100.0

[input_file]
# 是否允许用户回复 QQ 文件消息后，用 /codex 把该文件作为输入材料。
enable_reply_file = true

# 输入材料放入 Codex workspace 下的目录名。
input_dir_name = "input"

# 单个任务最多导入多少个被回复文件。
max_files_per_task = 5

# 单个输入文件最大大小，单位 MB。0 表示不限制。
max_file_size_mb = 100.0

# 启动时是否自动清理超过 input_file_ttl_hours 的输入材料。
auto_cleanup_input_files = true

# 输入材料保留时间，单位小时。0 表示不自动清理。
# 只删除 workspace/input 下的输入材料，不删除产物、日志和 task 记录。
input_file_ttl_hours = 24.0

# 是否允许从文件消息中的 HTTP URL 下载材料。
allow_url_download = true

# 允许复制的本地文件根目录。空列表表示禁止复制服务器本地路径。
# 日常使用建议通过 QQ 上传文件；确需读取本地目录时，由管理员显式配置允许根目录。
allowed_local_roots = []
